version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: karen-plugins-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: karen_plugins_production
      POSTGRES_USER: karen_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_in_production}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      POSTGRES_HOST_AUTH_METHOD: scram
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karen_user -d karen_plugins_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - karen-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: karen-plugins-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secure_redis_password_change_in_production}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - karen-network

  # Plugin Ecosystem Backend
  plugins-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.plugins
    image: ghcr.io/karen-ai/plugin-ecosystem:latest
    container_name: karen-plugins-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Production environment
      NODE_ENV: production
      APP_ENV: production
      PLUGIN_ENV: production

      # Database configuration
      DATABASE_URL: postgresql://karen_user:${POSTGRES_PASSWORD:-secure_password_change_in_production}@postgres:5432/karen_plugins_production
      DATABASE_SSL_MODE: require
      DATABASE_POOL_SIZE: 20
      DATABASE_MAX_OVERFLOW: 30
      DATABASE_ECHO: false

      # Redis configuration
      REDIS_URL: redis://:${REDIS_PASSWORD:-secure_redis_password_change_in_production}@redis:6379/0
      REDIS_SSL: true

      # Plugin configuration
      PLUGIN_STORAGE_DIR: /var/lib/karen/plugins
      PLUGIN_CACHE_DIR: /var/cache/karen/plugins
      PLUGIN_DISCOVERY_ENABLED: true
      PLUGIN_SANDBOX_ENABLED: true
      PLUGIN_RESOURCE_LIMITS_ENABLED: true

      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-secure-key}
      AUTH_SESSION_COOKIE_SECURE: true
      AUTH_SESSION_COOKIE_HTTPONLY: true

      # Logging
      PLUGIN_LOG_LEVEL: INFO
      PLUGIN_LOG_FILE: /var/log/karen/plugins.log

      # Health monitoring
      HEALTH_DASHBOARD_ENABLED: true
      HEALTH_CHECK_INTERVAL_SECONDS: 30
      HEALTH_ALERTS_ENABLED: true

      # Marketplace
      MARKETPLACE_ENABLED: true
      MARKETPLACE_CACHE_ENABLED: true

    volumes:
      - plugin_storage:/var/lib/karen/plugins
      - plugin_cache:/var/cache/karen/plugins
      - plugin_logs:/var/log/karen
      - plugin_backups:/var/backups/karen/plugins
      - ./src/extensions:/app/plugins-source
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/system"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - karen-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: karen-plugins-nginx
    restart: unless-stopped
    depends_on:
      - plugins-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - karen-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: karen-plugins-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - karen-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: karen-plugins-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_password_change_in_production}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: https://grafana.karen.ai
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - karen-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  plugin_storage:
    driver: local
  plugin_cache:
    driver: local
  plugin_logs:
    driver: local
  plugin_backups:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  karen-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16