services:
  # CUDA-enabled local GGUF service for GPU acceleration
  local-gguf-cuda:
    image: m1dnyt3/llama-cpp:server-cuda-12.9
    container_name: ai-karen-local-gguf
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    volumes:
      - ./models:/app/models
      - ./logs/local-gguf:/app/logs
      - ./config/local-gguf:/app/config
    ports:
      - "8081:8080"  # Separate port for CUDA version
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      --host 0.0.0.0
      --port 8080
      --model ./models/local-gguf/Phi-3-mini-4k-instruct-q4.gguf
      --n-gpu-layers -1
      --n-ctx 4096
      --n-batch 512
      --n-threads 8
      --verbose

  # Main AI-Karen application (CPU fallback)
  ai-karen:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: runtime-cuda
    container_name: ai-karen-app
    environment:
      - KARI_LOCAL_GGUF_HOST=local-gguf-cuda
      - KARI_LOCAL_GGUF_PORT=8080
      - KARI_LOCAL_GGUF_USE_CUDA=true
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./config:/app/config
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      local-gguf-cuda:
        condition: service_healthy
    networks:
      - ai-karen-network

networks:
  ai-karen-network:
    driver: bridge

volumes:
  models:
    driver: local
  logs:
    driver: local
