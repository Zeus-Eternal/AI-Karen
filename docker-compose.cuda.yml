services:
  # vLLM OpenAI-compatible inference server (GPU-accelerated)
  vllm:
    image: vllm/vllm-openai:latest
    container_name: ai-karen-vllm
    ipc: host
    profiles:
      - vllm
    ports:
      - "${KAREN_VLLM_PORT:-8001}:8000"
    environment:
      - HF_HOME=/models/huggingface
      - TRANSFORMERS_CACHE=/models/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - VLLM_ATTENTION_BACKEND=${VLLM_ATTENTION_BACKEND:-flashinfer}
    volumes:
      - ./models:/models
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${KAREN_VLLM_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}
      - --served-model-name
      - ${KAREN_VLLM_SERVED_MODEL_NAME:-karen-vllm-local}
      - --dtype
      - ${KAREN_VLLM_DTYPE:-auto}
      - --gpu-memory-utilization
      - ${KAREN_VLLM_GPU_MEMORY_UTILIZATION:-0.85}
      - --max-model-len
      - ${KAREN_VLLM_MAX_MODEL_LEN:-4096}
      - --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # CUDA-enabled local GGUF service for GPU acceleration
  local-gguf-cuda:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: runtime-cuda
    container_name: ai-karen-local-gguf
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - KARI_MODEL_PATH=/app/models/local-gguf/Phi-3-mini-4k-instruct-q4.gguf
      - KARI_MODEL_NAME=Phi-3-mini-4k-instruct-q4.gguf
    volumes:
      - ./models:/app/models
      - ./logs/local-gguf:/app/logs
      - ./config/local-gguf:/app/config
      - ./src:/app/src
    ports:
      - "8081:8080"  # Separate port for CUDA version
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["python", "-m", "ai_karen_engine.inference.local_gguf_server"]

  # Main AI-Karen application (CPU fallback)
  ai-karen:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: runtime-cuda
    container_name: ai-karen-app
    environment:
      - KARI_LOCAL_GGUF_HOST=local-gguf-cuda
      - KARI_LOCAL_GGUF_PORT=8080
      - KARI_LOCAL_GGUF_USE_CUDA=true
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./config:/app/config
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      local-gguf-cuda:
        condition: service_healthy
    networks:
      - ai-karen-network

networks:
  ai-karen-network:
    driver: bridge

volumes:
  models:
    driver: local
  logs:
    driver: local
