services:
  # ──────────────────────────────────────────────────────────────────────
  # vLLM OpenAI-compatible inference server (OPTIONAL)
  # Starts only with --profile vllm
  # Requires NVIDIA Container Toolkit for GPU access
  # ──────────────────────────────────────────────────────────────────────
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.6.6}
    container_name: ai-karen-vllm
    ipc: host
    restart: unless-stopped
    profiles:
      - vllm
    ports:
      - "${KAREN_BUILTIN_VLLM_HOST_PORT:-8001}:8000"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
      VLLM_ENABLE_CUDA_COMPATIBILITY: "${VLLM_ENABLE_CUDA_COMPATIBILITY:-0}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
    volumes:
      - ./models:/models
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${KAREN_BUILTIN_VLLM_MODEL_ID:-Qwen/Qwen2.5-1.5B-Instruct}
      - --served-model-name
      - ${KAREN_BUILTIN_VLLM_SERVED_MODEL_NAME:-karen-vllm-local}
      - --dtype
      - ${KAREN_BUILTIN_VLLM_DTYPE:-float16}
      - --gpu-memory-utilization
      - ${KAREN_BUILTIN_VLLM_GPU_MEMORY_UTILIZATION:-0.80}
      - --max-model-len
      - ${KAREN_BUILTIN_VLLM_MAX_MODEL_LEN:-4096}
      - --generation-config
      - vllm
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 240s
    networks:
      - ai-karen-network

  # CUDA-enabled local GGUF service for GPU acceleration
  local-gguf-cuda:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: runtime-cuda
    container_name: ai-karen-local-gguf
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - KARI_MODEL_PATH=/app/models/local-gguf/Phi-3-mini-4k-instruct-q4.gguf
      - KARI_MODEL_NAME=Phi-3-mini-4k-instruct-q4.gguf
    volumes:
      - ./models:/app/models
      - ./logs/local-gguf:/app/logs
      - ./config/local-gguf:/app/config
      - ./src:/app/src
    ports:
      - "8081:8080"  # Separate port for CUDA version
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["python", "-m", "ai_karen_engine.inference.local_gguf_server"]

  # Main AI-Karen application (CPU fallback)
  ai-karen:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: runtime-cuda
    container_name: ai-karen-app
    environment:
      - KARI_LOCAL_GGUF_HOST=local-gguf-cuda
      - KARI_LOCAL_GGUF_PORT=8080
      - KARI_LOCAL_GGUF_USE_CUDA=true
      - PYTHONPATH=/app/src
      - KAREN_BUILTIN_VLLM_ENABLED=${KAREN_BUILTIN_VLLM_ENABLED:-true}
      - KAREN_BUILTIN_VLLM_BASE_URL=http://vllm:8000/v1
      - KAREN_BUILTIN_VLLM_HEALTH_URL=http://vllm:8000/health
      - KAREN_BUILTIN_VLLM_SERVED_MODEL_NAME=${KAREN_BUILTIN_VLLM_SERVED_MODEL_NAME:-karen-vllm-local}
      - KAREN_BUILTIN_VLLM_TIMEOUT_SECONDS=${KAREN_BUILTIN_VLLM_TIMEOUT_SECONDS:-120}
      - KAREN_BUILTIN_VLLM_STREAMING_ENABLED=${KAREN_BUILTIN_VLLM_STREAMING_ENABLED:-true}
      - KAREN_BUILTIN_VLLM_FALLBACK_ELIGIBLE=${KAREN_BUILTIN_VLLM_FALLBACK_ELIGIBLE:-true}
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./config:/app/config
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      local-gguf-cuda:
        condition: service_healthy
    networks:
      - ai-karen-network

networks:
  ai-karen-network:
    driver: bridge

volumes:
  models:
    driver: local
  logs:
    driver: local
