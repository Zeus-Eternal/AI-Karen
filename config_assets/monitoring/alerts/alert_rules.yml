groups:
  - name: ai-karen-basic-alerts
    rules:
      - alert: ApiDown
        expr: up{job="ai-karen-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "AI Karen API is down"
          description: "Prometheus cannot scrape the ai-karen-api target for 2 minutes."

      - alert: PrometheusTargetMissing
        expr: absent(up{job="ai-karen-api"})
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API scrape target missing"
          description: "Prometheus no longer sees job=ai-karen-api in active targets."

      - alert: PrometheusConfigurationReloadFailed
        expr: prometheus_config_last_reload_successful != 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus config reload failed"
          description: "Prometheus could not reload its configuration successfully."
