global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus-copilot
    static_configs:
      - targets: ['localhost:9090']

  - job_name: ai-karen-copilot-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api-copilot:8000']

