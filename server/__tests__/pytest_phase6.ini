# Custom markers for test categorization
def pytest_configure(config):
    """Configure pytest with custom markers."""
    config.addinivalue_line(
        "markers", "copilotkit_alignment: tests for CopilotKit alignment validation"
    )
    config.addinivalue_line(
        "markers", "runtime_integration: tests for runtime integration"
    )
    config.addinivalue_line(
        "markers", "boundary_layer: tests for boundary layer functionality"
    )
    config.addinivalue_line(
        "markers", "end_to_end_workflow: tests for end-to-end workflows"
    )
    config.addinivalue_line(
        "markers", "performance: performance-related tests"
    )
    config.addinivalue_line(
        "markers", "security: security-related tests"
    )
    config.addinivalue_line(
        "markers", "slow: slow-running tests"
    )


# Custom command line options
def pytest_addoption(parser):
    """Add custom command line options."""
    parser.addoption(
        "--test-category",
        action="store",
        choices=["copilotkit_alignment", "runtime_integration", "boundary_layer", "end_to_end_workflow", "all"],
        default="all",
        help="Run specific test category"
    )
    parser.addoption(
        "--test-session",
        action="store",
        default="test_session_123",
        help="Default session ID for tests"
    )
    parser.addoption(
        "--verbose-output",
        action="store_true",
        default=False,
        help="Enable verbose output for debugging"
    )
    parser.addoption(
        "--coverage-report",
        action="store_true",
        default=False,
        help="Generate coverage report"
    )


# Custom hooks for test collection
def pytest_collection_modifyitems(config, items):
    """Modify test collection based on command line options."""
    category = config.getoption("--test-category")
    
    if category != "all":
        # Skip tests that don't match the selected category
        for item in items:
            if category == "copilotkit_alignment":
                if "copilotkit_alignment" not in item.keywords and "runtime_integration" not in item.keywords:
                    item.add_marker(pytest.mark.skip("Not in copilotkit_alignment category"))
            elif category == "runtime_integration":
                if "runtime_integration" not in item.keywords:
                    item.add_marker(pytest.mark.skip("Not in runtime_integration category"))
            elif category == "boundary_layer":
                if "boundary_layer" not in item.keywords:
                    item.add_marker(pytest.mark.skip("Not in boundary_layer category"))
            elif category == "end_to_end_workflow":
                if "end_to_end_workflow" not in item.keywords:
                    item.add_marker(pytest.mark.skip("Not in end_to_end_workflow category"))


