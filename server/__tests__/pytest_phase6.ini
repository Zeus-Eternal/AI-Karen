# Custom hooks for test reporting
@pytest.hookimpl(tryfirst=True, hookwrapper=True)
def pytest_runtest_makereport(item, call):
    """Add custom reporting for test results."""
    # Execute all other hooks to obtain the report object
    outcome = yield
    report = outcome.get_result()
    
    # Add custom attributes to the report
    if report.when == "call":
        report.category = "unknown"
        for marker in item.iter_markers():
            if marker.name in ["copilotkit_alignment", "runtime_integration", "boundary_layer", "end_to_end_workflow"]:
                report.category = marker.name
                break


# Custom assertion helpers
class TestAssertions:
    """Custom assertion helpers for integration testing."""
    
    @staticmethod
    def assert_task_response_valid(response):
        """Assert that a task response is valid."""
        assert hasattr(response, 'success')
        assert hasattr(response, 'task_id')
        assert hasattr(response, 'content')
        assert hasattr(response, 'execution_metadata')
        assert isinstance(response.success, bool)
        assert isinstance(response.task_id, str)
        assert isinstance(response.content, str)
        assert isinstance(response.execution_metadata, dict)
    
    @staticmethod
    def assert_session_state_valid(state):
        """Assert that session state is valid."""
        assert isinstance(state, dict)
        assert "session_id" in state
        assert isinstance(state["session_id"], str)
    
    @staticmethod
    def assert_thread_mapping_valid(thread_id, session_id):
        """Assert that thread mapping is valid."""
        assert isinstance(thread_id, str)
        assert isinstance(session_id, str)
        assert thread_id.startswith("langgraph_")
        assert len(thread_id) > len("langgraph_")
    
    @staticmethod
    def assert_progress_tracking_valid(progress):
        """Assert that progress tracking is valid."""
        assert hasattr(progress, 'task_id')
        assert hasattr(progress, 'status')
        assert hasattr(progress, 'progress_percentage')
        assert hasattr(progress, 'updated_at')
        assert isinstance(progress.task_id, str)
        assert isinstance(progress.status, str)
        assert isinstance(progress.progress_percentage, (int, float))
        assert progress.progress_percentage >= 0.0
        assert progress.progress_percentage <= 100.0


# Custom pytest command
def pytest_terminal_summary(terminalreporter, exitstatus, config):
    """Generate custom terminal summary."""
    if config.getoption("--verbose-output"):
        terminalreporter.write_sep("=", "Phase 6 Integration Test Summary")
        
        # Count tests by category
        category_counts = {
            "copilotkit_alignment": 0,
            "runtime_integration": 0,
            "boundary_layer": 0,
            "end_to_end_workflow": 0
        }
        
        for test in terminalreporter.stats.get("passed", []):
            if hasattr(test, "category"):
                category_counts[test.category] += 1
        
        for test in terminalreporter.stats.get("failed", []):
            if hasattr(test, "category"):
                category_counts[test.category] += 1
        
        terminalreporter.write_line("Tests by category:")
        for category, count in category_counts.items():
            terminalreporter.write_line(f"  {category}: {count}")
        
        terminalreporter.write_sep("=")


# Custom markers for test organization
def pytest_make_parametrize_id(config, val, argname):
    """Custom parametrize ID generation."""
    if isinstance(val, dict):
        return f"{argname}_{val.get('category', 'unknown')}"
    return str(val)


# Custom test skipping
